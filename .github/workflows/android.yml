name: Build & Release Android App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Make Gradlew Executable
      run: chmod +x gradlew

    - name: Build Release App Bundle (AAB) & APK
      run: ./gradlew :app:bundleRelease :app:assembleDebug --stacktrace

    - name: Get Version Name
      id: get_version
      run: echo "VERSION_NAME=v1.0.$(date +'%Y%m%d.%H%M%S')" >> $GITHUB_ENV

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.VERSION_NAME }}
        name: Release ${{ env.VERSION_NAME }}
        draft: false
        prerelease: false
        files: |
          app/build/outputs/bundle/release/app-release.aab
          app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
